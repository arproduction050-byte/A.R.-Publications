<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>{% block title %}A.R. Publications | The Literary Universe of Anuj Rawal{% endblock %}</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* 1. Cream Background for Light Theme */
        body {
            background-color: #e4d6bb !important; /* Premium Cream Color */
            transition: background-color 1.2s ease;
        }

        /* 2. Cream Navbar */
        .navbar {
            background: #ffe9bc !important; /* Cream color with slight transparency */
            border-bottom: 1px solid rgba(0,0,0,0.08) !important;
            transition: background 1.2s ease, border-color 1.2s ease;
        }
        
        .navbar .nav-link { color: #0a0a16; font-weight: 600; transition: color 1.2s ease; }
        .navbar .menu-toggle .bar { background: #0a0a16; transition: background 1.2s ease; }
        
        /* --- 3. BRAND LOGO STYLING (3D & Shadows) --- */
        .logo {
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        /* 3D Upliftment Effect on Hover */
        .logo:hover {
            transform: translateY(-4px) scale(1.02);
        }

        /* A.R. - Plain White with Heavy Black Shadow */
        .brand-ar { 
            color: #ffffff !important; 
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0px 4px 8px rgba(0,0,0,0.7);
            transition: color 1.2s ease, text-shadow 0.3s ease; 
        }

        /* Publications - Orange with Black Shadow */
        .brand-pub { 
            color: #FF8C42 !important; /* Vibrant Orange */
            font-weight: 400; 
            font-size: 1.4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0px 4px 8px rgba(0,0,0,0.7);
            transition: color 1.2s ease, text-shadow 0.3s ease; 
        }

        /* Feather Leaf - Orange with Drop Shadow */
        .brand-icon {
            color: #FF8C42; /* Vibrant Orange */
            font-size: 1.5rem; 
            transform: rotate(-15deg);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.8)) drop-shadow(0px 4px 4px rgba(0,0,0,0.5));
            transition: color 1.2s ease, filter 0.3s ease;
        }

        /* Special Contact Button */
        .navbar .btn-nav {
            background: linear-gradient(45deg, #FF9900, #FFD700) !important;
            color: #000 !important;
            border-radius: 30px;
            padding: 8px 25px;
            font-weight: 800 !important;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .navbar .btn-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 153, 0, 0.4);
        }

        /* --- 4. VANKARI DARK MODE OVERRIDES --- */
        body.vankari-active {
            background-color: #050505 !important; /* Reverts to Pitch Black */
        }
        body.vankari-active .navbar {
            background: rgba(5, 5, 5, 0.95) !important;
            border-bottom: 1px solid rgba(139, 0, 0, 0.4) !important;
        }
        
        body.vankari-active .brand-ar { 
            color: #ffffff !important; 
        }
        
        /* Blood Red Transition for Feather and Publications */
        body.vankari-active .brand-icon { 
            color: #8b0000 !important; /* Dark Blood Red */
            filter: drop-shadow(2px 2px 5px rgba(139,0,0,0.8)); 
        }
        body.vankari-active .brand-pub { 
            color: #8b0000 !important; /* Dark Blood Red */
            text-shadow: 2px 2px 5px rgba(139,0,0,0.8), 0 0 10px rgba(0,0,0,1); 
        }
        
        body.vankari-active .navbar .nav-link { color: #ffffff !important; }
        body.vankari-active .navbar .menu-toggle .bar { background: #ffffff !important; }
    </style>
</head>
<body>

    {% block navbar %}
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('home') }}" class="logo" style="font-family: 'Poppins', serif;">
                <i class="fas fa-feather-alt brand-icon"></i>
                <span class="brand-ar">A.R.</span> <span class="brand-pub">Publications</span>
            </a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            
            <ul class="nav-menu">
                <li><a href="{{ url_for('home') }}" class="nav-link">Home</a></li>
                <li><a href="{{ url_for('home') }}#books-universe" class="nav-link">The Universe</a></li>
                <li><a href="{{ url_for('home') }}#contact" class="nav-link btn-nav">Contact</a></li>
            </ul>
        </div>
    </nav>
    {% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <audio id="sanatan-global-audio" src="{{ url_for('static', filename='audio/sanatan-sound.mp3') }}" preload="auto"></audio>
    <audio id="vankari-global-audio" src="{{ url_for('static', filename='audio/vankari-sound.mp3') }}" preload="auto"></audio>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const pendingSound = localStorage.getItem('pending_audio_type');
        if (pendingSound) {
            const audio = document.getElementById(pendingSound + '-global-audio');
            if (audio) {
                audio.play().then(() => { localStorage.removeItem('pending_audio_type'); })
                .catch(error => {
                    const playOnInteraction = () => {
                        audio.play();
                        localStorage.removeItem('pending_audio_type');
                        document.removeEventListener('click', playOnInteraction);
                    };
                    document.addEventListener('click', playOnInteraction);
                });
            }
        }
    });
    </script>
    <style>
        /* Navbar ke transition me transform add karna taaki smooth slide ho */
        .navbar {
            transition: transform 0.4s ease-in-out, background 1.2s ease, border-color 1.2s ease !important;
        }
        
        /* Navbar hide karne wali class */
        .navbar.nav-hidden {
            transform: translateY(-100%);
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let lastScrollTop = 0;
            const navbar = document.querySelector('.navbar');

            window.addEventListener('scroll', function() {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                // Check if we are in Mobile View (width <= 968px)
                if (window.innerWidth <= 968) {
                    // Agar user niche scroll kar raha hai aur top se 80px niche aachuka hai
                    if (scrollTop > lastScrollTop && scrollTop > 80) {
                        navbar.classList.add('nav-hidden'); // Hide Navbar
                    } else {
                        // Agar user upar scroll kar raha hai
                        navbar.classList.remove('nav-hidden'); // Show Navbar
                    }
                } else {
                    // Desktop view me hamesha visible rahega
                    navbar.classList.remove('nav-hidden');
                }
                
                lastScrollTop = scrollTop;
            });
        });
    </script>
</body>
</html>
